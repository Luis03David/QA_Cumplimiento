name: Docker image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      push_image:
        description: "Push image to registry"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      image_name:
        description: "Docker Hub image name"
        required: false
        default: "luis03david/qa_cumplimiento"
      image_tag:
        description: "Docker image tag"
        required: false
        default: "latest"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          push: false
          tags: qa-cumplimiento:${{ github.sha }}

      - name: Run container smoke test
        run: docker run --rm qa-cumplimiento:${{ github.sha }}

  publish:
    runs-on: ubuntu-latest
    if: (github.event_name == 'workflow_dispatch' && inputs.push_image == 'true') || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve Docker image metadata
        id: docker_meta
        shell: bash
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            image_name="${{ inputs.image_name }}"
            image_tag="${{ inputs.image_tag }}"
          else
            image_name="luis03david/qa_cumplimiento"
            image_tag="$GITHUB_REF_NAME"
          fi

          echo "image_name=$image_name" >> "$GITHUB_OUTPUT"
          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.docker_meta.outputs.image_name }}:${{ steps.docker_meta.outputs.image_tag }}
            ${{ steps.docker_meta.outputs.image_name }}:${{ github.sha }}
