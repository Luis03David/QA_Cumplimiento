name: Docker image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      push_image:
        description: "Push image to registry"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      image_name:
        description: "Image name, for example ghcr.io/Luis03David/QA_cumplimineto"
        required: false
        default: "ghcr.io/Luis03David/QA_cumplimineto"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          push: false
          tags: qa-cumplimiento:${{ github.sha }}

      - name: Run container smoke test
        run: docker run --rm qa-cumplimiento:${{ github.sha }}

  publish:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.push_image == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ inputs.image_name }}:${{ github.sha }}
            ${{ inputs.image_name }}:latest

